[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ronin"
version = "0.0.1"
description = "Omni-agent harness for locally-run mid-grade models"
requires-python = ">=3.11"
authors = [{ name = "lycaon" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
# Project is "Ronin" but the binary is `rn` to avoid the very crowded
# `ronin` namespace (Node CLI framework, npm @ronin/cli, ronin-rb,
# axieinfinity blockchain, hundredrabbits graphics terminal, etc).
# Convention: ripgrep → rg, fd-find → fd, bat-cat → bat.
rn = "ronin.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
