[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ronin"
version = "0.0.1"
description = "Omni-agent harness for locally-run mid-grade models"
requires-python = ">=3.11"
authors = [{ name = "lycaon" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.setuptools.packages.find]
where = ["src"]
